version: '3.8'

networks:
  lab-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

services:

  api-server:
    build: ./api-server
    container_name: api-server
    cap_add:
      - SYS_PTRACE
    networks:
      lab-net:
        ipv4_address: 172.20.0.10
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 5s
      timeout: 3s
      retries: 3

  load-gen:
    build: ./load-gen
    container_name: load-gen
    depends_on:
      api-server:
        condition: service_healthy
    networks:
      lab-net:
        ipv4_address: 172.20.0.20
